name: Readify API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-restx

      - name: Start Flask server
        run: |
          python app.py &
          sleep 5

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run tests/readify-api-tests.json \
            --environment tests/readify-env.json \
            --reporters cli